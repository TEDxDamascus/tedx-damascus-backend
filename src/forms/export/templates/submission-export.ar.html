<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>{{formName}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px 40px;
      font-family: 'Noto Sans Arabic', 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      line-height: 1.7;
      color: #111827;
      background: #ffffff;
    }

    header {
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e11d48;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    header .meta {
      margin: 0;
      font-size: 11px;
      color: #6b7280;
    }

    .section {
      margin-top: 24px;
      margin-bottom: 8px;
    }

    .section h2 {
      margin: 0;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #111827;
      border-radius: 4px;
    }

    .qa {
      margin-bottom: 14px;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      page-break-inside: avoid;
    }

    .question {
      font-weight: 600;
      font-size: 11px;
      color: #374151;
      margin-bottom: 6px;
    }

    .answer {
      font-size: 12px;
      color: #111827;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .answer a {
      color: #e11d48;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{formName}}</h1>
    <p class="meta">معرّف المستخدم: {{userId}}</p>
  </header>
  <main>
    {{itemsHtml}}
  </main>
</body>
</html>
