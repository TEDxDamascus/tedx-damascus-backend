<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
</head>

<body style="margin:0;padding:0;background-color:#f6f6f6;">

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f6f6f6;padding:20px 0;">
    <tr>
      <td align="center">

        <!-- Main container -->
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#111827;">

          <!-- Header -->
          <tr>
            <td style="padding:24px;text-align:center;background:#111827;color:#ffffff;">
              <h1 style="margin:0;font-size:22px;">
                {{title}}
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px;line-height:1.6;">

              <p style="margin:0 0 16px;">
                Hello,
              </p>

              {{image}}

              <div style="margin:0 0 16px;">
                {{message}}
              </div>

              <p style="margin-top:24px;">
                Regards,<br>
                <strong>{{footer}}</strong>
              </p>

            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 32px;">
              <hr style="border:none;border-top:1px solid #e5e7eb;">
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px;font-size:12px;color:#6b7280;text-align:center;">
              <p style="margin:0;">
                This email was sent by {{footer}}
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
